components:
  schemas:
    proxy.ErrorResponse:
      properties:
        details:
          example: upstream returned non-2xx status
          type: string
        error:
          example: service not defined
          type: string
        service:
          example: google-places
          type: string
        status:
          example: 404
          type: integer
      type: object
    proxy.ExecuteRequest:
      properties:
        body: {}
        headers:
          additionalProperties:
            type: string
          example:
            '{"X-Correlation-Id"': '"abc-123"}'
          type: object
        method:
          example: GET
          type: string
        path:
          example: /maps/api/place/details/json
          type: string
        query:
          additionalProperties:
            type: string
          example:
            '{"place_id"': '"ChIJN1t_tDeuEmsRUsoyG83frY4"}'
          type: object
        service:
          example: google-places
          type: string
      required:
      - method
      - path
      - service
      type: object
info:
  contact: {}
  description: Config-driven proxy API for calling whitelisted external services without
    exposing secrets to frontend clients.
  title: Request Proxy Service API
  version: "1.0"
openapi: 3.0.3
paths:
  /api/proxy/execute:
    post:
      description: Executes a request against a whitelisted service from config/services.json
        and returns raw upstream payload for 2xx responses.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/proxy.ExecuteRequest'
        description: Proxy request definition
        required: true
        x-originalParamName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
            text/plain:
              schema:
                type: string
            text/xml:
              schema:
                type: string
          description: Raw upstream response body
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/plain:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/xml:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/plain:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/xml:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
          description: Not Found
        "405":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/plain:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/xml:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
          description: Method Not Allowed
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/plain:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/xml:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/plain:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
            text/xml:
              schema:
                $ref: '#/components/schemas/proxy.ErrorResponse'
          description: Bad Gateway
      summary: Execute configured upstream service request
      tags:
      - RequestProxyService
tags:
- description: Generic proxy endpoints for configured external service calls.
  name: RequestProxyService
