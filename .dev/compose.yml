services:
  nginx:
    image: nginx:1.27-alpine
    container_name: car-rental-nginx
    restart: unless-stopped
    depends_on:
      - car-rental-service
      - currency-converter-service
      - request-proxy-service
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - carrental-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: mssql_server
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - carrental-network

  car-rental-service:
    build:
      context: ../CarRentalService
      dockerfile: Dockerfile
    container_name: car-rental-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=CarRentalDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      CurrencyConverterSettings__BaseUrl: "http://currency-converter-service:8080/soap"
      CurrencyConverterSettings__Username: "${CURRENCY_CONVERTER_SOAP_USERNAME:-admin}"
      CurrencyConverterSettings__Password: "${CURRENCY_CONVERTER_SOAP_PASSWORD:-admin}"
      Keycloak__auth-server-url: "http://keycloak:8080/"
      KeycloakAdmin__authServerUrl: "http://keycloak:8080/"
      KeycloakAdmin__realm: "car-rental-dev"
      KeycloakBootstrapAdmin__Username: "root"
      KeycloakBootstrapAdmin__Password: "root"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - carrental-network

  db-seeder:
    image: mcr.microsoft.com/mssql/server:2025-latest
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./seed.sql:/seed.sql:ro
      - ./seed.sh:/seed.sh:ro
    entrypoint: ["/bin/bash", "/seed.sh"]
    restart: "no"
    networks:
      - carrental-network

  currency-converter-service:
    build:
      context: ../CurrencyConverterService
      dockerfile: Dockerfile
    container_name: currency-converter-service
    restart: unless-stopped
    environment:
      SOAP_USERNAME: "${CURRENCY_CONVERTER_SOAP_USERNAME:-admin}"
      SOAP_PASSWORD: "${CURRENCY_CONVERTER_SOAP_PASSWORD:-admin}"
    networks:
      - carrental-network

  request-proxy-service:
    build:
      context: ../RequestProxyService
      dockerfile: Dockerfile
    container_name: request-proxy-service
    restart: unless-stopped
    environment:
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
      PEXELS_API_KEY: "${PEXELS_API_KEY}"
    networks:
      - carrental-network

  keycloak:
    build:
      context: ../KeycloakService
      dockerfile: Dockerfile
    image: car-rental-keycloak:dev
    container_name: keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "root"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "root"
      KEYCLOAK_IMPORT_MODE: "dev"
      KEYCLOAK_REALM_TEMPLATE: "car-rental-dev-realm.json"
      KEYCLOAK_FRONTEND_URL: "http://localhost:5173"
      KEYCLOAK_REALM_NAME: "car-rental-dev"
      KEYCLOAK_SSL_REQUIRED: "none"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "7070:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - carrental-network

volumes:
  mssql_data:
  keycloak_data:

networks:
  carrental-network:
    driver: bridge
