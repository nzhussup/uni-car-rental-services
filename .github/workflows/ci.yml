name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    name: Prepare Service Matrix
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare matrix
        id: prepare
        uses: ./.github/templates/prepare

  quality:
    name: Quality (${{ matrix.name }})
    runs-on: self-hosted
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Skip quality for build-only service
        if: matrix.type == 'build-only'
        shell: bash
        run: echo "Skipping quality for ${{ matrix.name }} (serviceType=build-only)."

      - name: Run quality template
        if: matrix.type != 'build-only'
        uses: ./.github/templates/quality
        with:
          serviceName: ${{ matrix.name }}
          servicePath: ${{ matrix.path }}
          serviceType: ${{ matrix.type }}
          solution: ${{ matrix.solution }}
          project: ${{ matrix.project }}

  test:
    name: Test (${{ matrix.name }})
    runs-on: self-hosted
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Skip tests for build-only service
        if: matrix.type == 'build-only'
        shell: bash
        run: echo "Skipping tests for ${{ matrix.name }} (serviceType=build-only)."

      - name: Run test template
        if: matrix.type != 'build-only'
        uses: ./.github/templates/test
        with:
          serviceName: ${{ matrix.name }}
          servicePath: ${{ matrix.path }}
          serviceType: ${{ matrix.type }}
          solution: ${{ matrix.solution }}
          project: ${{ matrix.project }}

  build:
    name: Build (${{ matrix.name }})
    runs-on: self-hosted
    needs:
      - quality
      - test
      - prepare
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run build template
        uses: ./.github/templates/build
        with:
          serviceName: ${{ matrix.name }}
          servicePath: ${{ matrix.path }}
          serviceType: ${{ matrix.type }}
          registryToken: ${{ secrets.REGISTRY_TOKEN }}
