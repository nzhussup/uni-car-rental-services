name: Build images
description: Build and push Docker images to GHCR with multiplatform support
inputs:
  serviceName:
    required: true
    description: Logical service name
  servicePath:
    required: true
    description: Service directory path
  serviceType:
    required: true
    description: go or dotnet
  registryToken:
    required: true
    description:
      GitHub token with write:packages permission (use PAT, not GITHUB_TOKEN)
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: network=host

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.registryToken }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ inputs.serviceName }}
        tags: |
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.servicePath }}
        file: ${{ inputs.servicePath }}/Dockerfile
        network: host
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
