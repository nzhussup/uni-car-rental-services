name: Build images
description: Build and push Docker images to GHCR with multiplatform support
inputs:
  serviceName:
    required: true
    description: Logical service name
  servicePath:
    required: true
    description: Service directory path
  serviceType:
    required: true
    description: go or dotnet
  registryToken:
    required: true
    description:
      GitHub token with write:packages permission (use PAT, not GITHUB_TOKEN)
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.registryToken }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.servicePath }}
        file: ${{ inputs.servicePath }}/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/timmy-2003/${{ inputs.serviceName }}:latest
