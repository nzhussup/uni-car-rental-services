  "/api/proxy/execute":
    post:
      description: "Executes a request against a whitelisted service from config/services.json and returns raw upstream payload for 2xx responses."
      requestBody:
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/proxy.ExecuteRequest"
        description: "Proxy request definition"
        required: true
        x-originalParamName: "request"
      responses:
        "200":
          content:
            "application/json":
              schema:
                type: "string"
            "text/plain":
              schema:
                type: "string"
            "text/xml":
