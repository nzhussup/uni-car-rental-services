          description: "Bad Gateway"
      summary: "Execute configured upstream service request"
      tags:
        - "RequestProxyService"
components:
  schemas:
    BookingDto:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
        carId:
          type: "integer"
          format: "int32"
        userId:
          type: "integer"
          format: "int32"
        bookingDate:
          type: "string"
          format: "date-time"
        pickupDate:
          type: "string"
          format: "date-time"
        dropoffDate:
          type: "string"
          format: "date-time"
        totalCostInUsd:
          type: "number"
          format: "double"
        status:
          "$ref": "#/components/schemas/BookingStatus"
      additionalProperties: false
    BookingStatus:
      enum:
        - "Booked"
        - "Canceled"
        - "PickedUp"
        - "ReturnLate"
        - "Completed"
      type: "string"
    CarDto:
      required:
        - "make"
        - "model"
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
        make:
          type: "string"
          nullable: true
        model:
          type: "string"
          nullable: true
        year:
          type: "integer"
          format: "int32"
        priceInUsd:
          type: "number"
          format: "double"
        status:
          "$ref": "#/components/schemas/CarStatus"
      additionalProperties: false
    CarStatus:
      enum:
        - "Available"
        - "Rented"
        - "Maintenance"
      type: "string"
    CreateBookingDto:
      required:
        - "dropoffDate"
        - "pickupDate"
      type: "object"
      properties:
        userId:
          type: "integer"
          format: "int32"
        carId:
          type: "integer"
          format: "int32"
        pickupDate:
          type: "string"
          format: "date-time"
        dropoffDate:
          type: "string"
          format: "date-time"
      additionalProperties: false
    CreateCarDto:
      required:
        - "make"
        - "model"
        - "priceInUsd"
        - "year"
      type: "object"
      properties:
        make:
          maxLength: 100
          minLength: 1
          type: "string"
        model:
          maxLength: 100
          minLength: 1
          type: "string"
        year:
          maximum: 2100
          minimum: 1900
          type: "integer"
          format: "int32"
        priceInUsd:
          maximum: 1.7976931348623157e+308
          minimum: 0.01
          type: "number"
          format: "double"
      additionalProperties: false
    ProblemDetails:
      type: "object"
      properties:
        type:
          type: "string"
          nullable: true
        title:
          type: "string"
          nullable: true
        status:
          type: "integer"
          format: "int32"
          nullable: true
        detail:
          type: "string"
          nullable: true
        instance:
