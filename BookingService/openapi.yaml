components:
  schemas:
    BookingDto:
      type: object
      properties:
        id:
          type: integer
          format: int32
        carId:
          type: integer
          format: int32
        userId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/UserDto'
        bookingDate:
          type: string
          format: date-time
        pickupDate:
          type: string
          format: date-time
        dropoffDate:
          type: string
          format: date-time
        totalCostInUsd:
          type: number
          format: double
        status:
          $ref: '#/components/schemas/BookingStatus'
      additionalProperties: false
    BookingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        carId:
          type: integer
          format: int32
        userId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/UserDto'
        bookingDate:
          type: string
          format: date-time
        pickupDate:
          type: string
          format: date-time
        dropoffDate:
          type: string
          format: date-time
        totalCost:
          $ref: '#/components/schemas/PriceDto'
        status:
          $ref: '#/components/schemas/BookingStatus'
      additionalProperties: false
    BookingResponseQueryResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int32
        elements:
          type: array
          items:
            $ref: '#/components/schemas/BookingResponse'
          nullable: true
      additionalProperties: false
    BookingStatus:
      enum:
        - Booked
        - Canceled
        - PickedUp
        - ReturnLate
        - Completed
        - Pending
      type: string
    CreateBookingDto:
      required:
        - dropoffDate
        - pickupDate
      type: object
      properties:
        carId:
          type: integer
          format: int32
        pickupDate:
          type: string
          format: date-time
        dropoffDate:
          type: string
          format: date-time
      additionalProperties: false
    PriceDto:
      required:
        - amount
        - currency
      type: object
      properties:
        amount:
          type: number
          format: double
        currency:
          type: string
          nullable: true
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: { }
    UpdateBookingStatusDto:
      required:
        - status
      type: object
      properties:
        status:
          $ref: '#/components/schemas/BookingStatus'
      additionalProperties: false
    UserDto:
      required:
        - email
        - firstName
        - lastName
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      additionalProperties: false
tags:
  - name: Booking