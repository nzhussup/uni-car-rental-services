          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateBookingDto'
        required: true
      responses:
        '201':
          description: Created
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BookingDto'
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDto'
            text/json:
              schema:
